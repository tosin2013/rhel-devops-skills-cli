# onboard.yml — Onboarding manifest for acm-virt-management-demo
# Spec version 1.0
#
# This is a complete working example. Copy and adapt it for your project.
# See manifest-spec.md for the full schema reference.

name: acm-virt-management-demo
description: ACM + OpenShift Virtualization multi-cluster workshop
deploy_script: agnosticd/deploy.sh

# ─────────────────────────────────────────────────────────────
# Prerequisites
# ─────────────────────────────────────────────────────────────

prerequisites:
  - name: python3
    check_command: "python3 --version"
    version_regex: "Python (\\d+\\.\\d+)"
    min_version: "3.12"
    install:
      macos: "brew install python@3.12"
      rhel9: "sudo dnf install -y python3.12"
      rhel8: "sudo dnf install -y python3.12"
      fedora: "sudo dnf install -y python3.12"
      debian: "sudo apt-get install -y python3"
      fallback: "Install Python 3.12+ from https://python.org"

  - name: podman
    check_command: "podman --version"
    version_regex: "podman version (\\d+\\.\\d+)"
    min_version: "5.0"
    install:
      macos: "brew install podman"
      rhel9: "sudo dnf install -y podman"
      rhel8: "sudo dnf install -y podman"
      fedora: "sudo dnf install -y podman"
      debian: "sudo apt-get install -y podman"
      fallback: "Install Podman 5+ from https://podman.io"

  - name: awscli
    check_command: "aws --version"
    version_regex: "aws-cli/(\\d+\\.\\d+)"
    install:
      macos: "brew install awscli"
      rhel9: "sudo dnf install -y awscli2"
      rhel8: "pip3 install awscli"
      fedora: "sudo dnf install -y awscli2"
      debian: "sudo apt-get install -y awscli"
      fallback: "Install AWS CLI from https://aws.amazon.com/cli/"

  - name: sshpass
    check_command: "command -v sshpass"
    install:
      macos: "brew install esolitos/ipa/sshpass"
      rhel9: "sudo dnf install -y sshpass"
      rhel8: "sudo dnf install -y sshpass"
      fedora: "sudo dnf install -y sshpass"
      debian: "sudo apt-get install -y sshpass"
      fallback: "Install sshpass from your package manager"

  - name: git
    check_command: "git --version"
    install:
      macos: "brew install git"
      rhel9: "sudo dnf install -y git"
      rhel8: "sudo dnf install -y git"
      fedora: "sudo dnf install -y git"
      debian: "sudo apt-get install -y git"

# ─────────────────────────────────────────────────────────────
# Setup Steps
# ─────────────────────────────────────────────────────────────

setup_steps:
  - name: "Clone AgnosticD v2"
    check: "test -d ${agnosticd_root}/bin/agd"
    action: "git clone https://github.com/agnosticd/agnosticd-v2.git ${agnosticd_root}"
    prompt_var: agnosticd_root
    prompt: "AgnosticD v2 install path"
    default: "~/Development/agnosticd-v2"

  - name: "Run agd setup"
    check: "test -d ${agnosticd_root}/../agnosticd-v2-vars"
    action: "cd ${agnosticd_root} && ./bin/agd setup"

  - name: "Scaffold secrets file"
    check: "test -f ${agnosticd_root}/../agnosticd-v2-secrets/secrets-${account}.yml"
    action: "cp ${agnosticd_root}/../agnosticd-v2-secrets/secrets-example.yml ${agnosticd_root}/../agnosticd-v2-secrets/secrets-${account}.yml"

# ─────────────────────────────────────────────────────────────
# Configuration Prompts
# ─────────────────────────────────────────────────────────────

config:
  output_file: agnosticd/config.yml
  gitignore: true

  prompts:
    - key: account
      prompt: "Account name (matches secrets filename)"
      default: "sandbox3008"
      required: true

    - key: aws_region
      prompt: "AWS region"
      default: "us-east-2"

    - key: num_students
      prompt: "Number of student clusters"
      default: "1"

    - key: student_type
      prompt: "Student cluster type"
      choices: ["sno", "multinode"]
      default: "sno"

    - key: deploy_hub
      prompt: "Deploy hub cluster?"
      choices: ["true", "false"]
      default: "true"

    - key: deploy_showroom
      prompt: "Deploy Showroom lab guide?"
      choices: ["true", "false"]
      default: "true"

    - key: parallel
      prompt: "Parallel student provisioning?"
      choices: ["true", "false"]
      default: "false"

    - key: hub_guid
      prompt: "Hub cluster GUID"
      default: "acmvirt-hub"

    - key: owner
      prompt: "Owner email (AWS resource tag)"
      default: ""

    - key: ssh_keys_url
      prompt: "SSH authorized keys URL (e.g., https://github.com/youruser.keys)"
      default: ""

    - key: base_domain
      prompt: "Base domain (must have Route53 hosted zone)"
      default: ""
      required: true

    - key: pull_secret_path
      prompt: "Path to OpenShift pull secret"
      default: "~/pull-secret.json"

    - key: agnosticd_root
      prompt: "AgnosticD v2 install path"
      default: "~/Development/agnosticd-v2"

# ─────────────────────────────────────────────────────────────
# Validation Checks
# ─────────────────────────────────────────────────────────────

validation:
  - name: "AWS credentials"
    command: "aws sts get-caller-identity"
    required: false
    fail_message: "AWS credentials not configured. Run 'aws configure' or set AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY."

  - name: "Pull secret exists"
    command: "test -f ${pull_secret_path}"
    required: true
    fail_message: "Download your pull secret from https://console.redhat.com/openshift/downloads"

  - name: "Pull secret is valid JSON"
    command: "python3 -m json.tool ${pull_secret_path} > /dev/null 2>&1"
    required: true
    fail_message: "Pull secret file is not valid JSON. Re-download it."

  - name: "AgnosticD agd binary"
    command: "test -x ${agnosticd_root}/bin/agd"
    required: true
    fail_message: "AgnosticD not found. Re-run project-onboard or clone manually."

  - name: "Secrets file exists"
    command: "test -f ${agnosticd_root}/../agnosticd-v2-secrets/secrets-${account}.yml"
    required: true
    fail_message: "Secrets file not found. Create it from secrets-example.yml."

  - name: "Route53 hosted zone"
    command: "aws route53 list-hosted-zones --query \"HostedZones[?Name=='${base_domain}.']\" --output text | grep -q HOSTED"
    required: false
    fail_message: "No Route53 hosted zone found for ${base_domain}. The OpenShift installer requires this."

# ─────────────────────────────────────────────────────────────
# Post-Setup Message
# ─────────────────────────────────────────────────────────────

post_setup:
  message: |
    Setup complete! Next steps:

    1. Fill in your AWS credentials in:
       ${agnosticd_root}/../agnosticd-v2-secrets/secrets-${account}.yml

       Required fields:
         aws_access_key_id: "AKIA..."
         aws_secret_access_key: "wJalr..."
         base_domain: "${base_domain}"

    2. Deploy:
       make deploy
       # or: ./agnosticd/deploy.sh

    3. When finished:
       make teardown

    Full reference: agnosticd/DEPLOYMENT.md

# ─────────────────────────────────────────────────────────────
# Quota Checks (run before deployment)
# ─────────────────────────────────────────────────────────────

quota_checks:
  - label: "EC2 vCPUs (On-Demand Standard)"
    needed: 32
    limit_command: >-
      aws service-quotas get-service-quota
        --service-code ec2 --quota-code L-1216C47A
        --region ${aws_region}
        --query 'Quota.Value' --output text
    usage_command: >-
      aws ec2 describe-instances
        --region ${aws_region}
        --filters Name=instance-state-name,Values=running
        --query 'Reservations[].Instances[] | length(@)' --output text
    fail_message: >-
      Request a vCPU limit increase at
      https://console.aws.amazon.com/servicequotas/

  - label: "Elastic IPs"
    needed: 5
    limit_command: >-
      aws service-quotas get-service-quota
        --service-code ec2 --quota-code L-0263D0A3
        --region ${aws_region}
        --query 'Quota.Value' --output text
    usage_command: >-
      aws ec2 describe-addresses
        --region ${aws_region}
        --query 'Addresses | length(@)' --output text
    fail_message: "Release unused Elastic IPs or request a limit increase."

  - label: "VPCs"
    needed: 2
    limit_command: >-
      aws service-quotas get-service-quota
        --service-code vpc --quota-code L-F678F1CE
        --region ${aws_region}
        --query 'Quota.Value' --output text
    usage_command: >-
      aws ec2 describe-vpcs
        --region ${aws_region}
        --query 'Vpcs | length(@)' --output text
    fail_message: "Delete unused VPCs or request a limit increase."

# ─────────────────────────────────────────────────────────────
# Modes (dev = maintainers, prod = end users)
# ─────────────────────────────────────────────────────────────

modes:
  dev:
    description: "Set up maintainer/contributor development environment"
    phases: [prerequisites, setup_steps, config, validation]
    extra_prerequisites:
      - name: shellcheck
        check_command: "command -v shellcheck"
        install:
          macos: "brew install shellcheck"
          rhel9: "sudo dnf install -y ShellCheck"
          rhel8: "sudo dnf install -y ShellCheck"
          fedora: "sudo dnf install -y ShellCheck"
          debian: "sudo apt-get install -y shellcheck"
          fallback: "Install ShellCheck from https://www.shellcheck.net/"
      - name: yamllint
        check_command: "command -v yamllint"
        install:
          macos: "brew install yamllint"
          rhel9: "pip3 install yamllint"
          rhel8: "pip3 install yamllint"
          fedora: "sudo dnf install -y yamllint"
          debian: "sudo apt-get install -y yamllint"
          fallback: "pip3 install yamllint"
  prod:
    description: "Set up and deploy for end users"
    phases: [prerequisites, setup_steps, config, validation, deploy]
    post_validation_command: "./agnosticd/deploy.sh"
