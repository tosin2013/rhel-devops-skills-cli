name: Tests

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System info
        run: |
          echo "OS: $(uname -s)"
          echo "Bash: ${BASH_VERSION}"
          echo "Git: $(git --version)"
          command -v jq && echo "jq: $(jq --version)" || echo "jq: not found"
          command -v python3 && echo "python3: $(python3 --version)" || echo "python3: not found"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bash jq

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          if ! command -v jq &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Run tests
        run: |
          if [[ "$(uname -s)" == "Darwin" ]]; then
            /opt/homebrew/bin/bash tests/run-all.sh
          else
            bash tests/run-all.sh
          fi

      - name: Verify install.sh help
        run: |
          if [[ "$(uname -s)" == "Darwin" ]]; then
            /opt/homebrew/bin/bash install.sh help
          else
            bash install.sh help
          fi

      - name: Verify available skills
        run: |
          if [[ "$(uname -s)" == "Darwin" ]]; then
            /opt/homebrew/bin/bash install.sh available
          else
            bash install.sh available
          fi

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint install.sh
        run: shellcheck -x install.sh

      - name: Lint lib/*.sh
        run: shellcheck -x --severity=warning lib/*.sh

      - name: Lint tests/*.sh
        run: shellcheck -x tests/*.sh || true
